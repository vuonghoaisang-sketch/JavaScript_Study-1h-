<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blogs</title>
    <style>
      #blogs {
        font-family: Arial, Helvetica, sans-serif;
        border-collapse: collapse;
        width: 100%;
      }

      #blogs td,
      #blogs th {
        border: 1px solid #ddd;
        padding: 8px;
      }

      #blogs tr:nth-child(even) {
        background-color: #f2f2f2;
      }

      #blogs tr:hover {
        background-color: #ddd;
      }

      #blogs th {
        padding-top: 12px;
        padding-bottom: 12px;
        text-align: left;
        background-color: #04aa6d;
        color: white;
      }
    </style>
  </head>
  <body>
    <h1>Blogs</h1>
    <div style="margin-left: 20px">
      <label for="title">Title</label>
      <input type="text" id="title" />
    </div>
    <br />
    <div style="margin-left: 5px">
      <label for="">Author</label>
      <input type="text" id="author" />
    </div>
    <br />
    <div>
      <label for="">Content</label>
      <input type="text" id="content" />
    </div>
    <br />
    <div style="margin-left: 13px"><button id="saveBlog">Save</button></div>
    <br />
    <table id="blogs">
      <thead>
        <th>Id</th>
        <th>Tittle</th>
        <th>Author</th>
        <th>Content</th>
        <th>Action</th>
      </thead>
      <tbody></tbody>
    </table>
    <div></div>
    <script src="javascript_study.js"></script>
  </body>
</html>
